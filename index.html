<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laboratoire - Horloge</title>
  </head>
  <body>
    <div id="app">
      <div id="clock"></div>
      
      <div id="user-form-container">
        <form id="user-form">
          <h2>Informations utilisateur</h2>
          <div class="input-group">
            <label for="nameuser">Prénom :</label>
            <input type="text" id="nameuser" name="nameuser" placeholder="Votre prénom" required>
          </div>
          <div class="input-group">
            <label for="surname">Nom :</label>
            <input type="text" id="surname" name="surname" placeholder="Votre nom" required>
          </div>
          <div class="input-group">
            <label for="age">Âge :</label>
            <input type="number" id="age" name="age" placeholder="Votre âge" min="1" max="150" required>
          </div>
          <div class="input-group">
            <label for="country">Pays d'origine :</label>
            <select id="country" name="country" required>
              <option value="">-- Sélectionnez votre pays --</option>
            </select>
          </div>
          <button type="submit">Valider</button>
        </form>
      </div>

      <div id="user-info" class="hidden">
        <h3>Utilisateur connecté :</h3>
        <p id="user-display"></p>
        <p id="user-country"></p>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
